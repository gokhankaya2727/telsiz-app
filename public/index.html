<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Telsiz App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            background: #061008;
            color: #eafff1;
            font-family: Arial, sans-serif;
        }

        .app {
            max-width: 430px;
            margin: auto;
            min-height: 100vh;
            background: linear-gradient(180deg, #0d1d14, #050805);
            padding: 18px;
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #46ff5f;
        }

        .badge {
            background: #12351f;
            color: #46ff5f;
            padding: 7px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }

        .badge.busy {
            background: #3b1010;
            color: #ff4b4b;
        }

        .card {
            background: #101a13;
            border: 1px solid #1f3f29;
            border-radius: 22px;
            padding: 18px;
            margin-top: 18px;
            box-shadow: 0 0 25px #00ff6620;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            border-radius: 14px;
            border: 1px solid #245d38;
            background: #07110c;
            color: white;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: #46ff5f;
        }

        .join {
            width: 100%;
            padding: 15px;
            margin-top: 14px;
            border: none;
            border-radius: 14px;
            background: #46ff5f;
            color: #001607;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }

        .status {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
            min-height: 28px;
            color: #46ff5f;
            font-weight: bold;
        }

        .channel {
            text-align: center;
            color: #9fbba8;
            margin-top: 6px;
            font-size: 14px;
        }

        .talking-box {
            margin-top: 16px;
            padding: 14px;
            border-radius: 16px;
            background: #07110c;
            border: 1px solid #1f3f29;
            color: #9fbba8;
            text-align: center;
            font-size: 16px;
            min-height: 50px;
        }

        .talking-box.active {
            color: #46ff5f;
            border-color: #46ff5f;
            box-shadow: 0 0 25px #00ff6655;
            animation: pulseBox 1s infinite;
        }

        .talking-box.busy {
            color: #ff4b4b;
            border-color: #ff4b4b;
            box-shadow: 0 0 25px #ff4b4b55;
        }

        @keyframes pulseBox {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .ptt-wrap {
            display: flex;
            justify-content: center;
            margin-top: 28px;
        }

        #ptt {
            width: 210px;
            height: 210px;
            border-radius: 50%;
            border: 5px solid #46ff5f;
            background: radial-gradient(circle, #14251a, #07110c);
            color: #46ff5f;
            font-size: 38px;
            font-weight: bold;
            box-shadow: 0 0 35px #00ff6640;
            cursor: pointer;
            user-select: none;
        }

        #ptt.active {
            background: #46ff5f;
            color: #001607;
            box-shadow: 0 0 60px #46ff5f;
            transform: scale(0.96);
            animation: pulsePTT 0.8s infinite;
        }

        #ptt.busy {
            border-color: #ff4b4b;
            color: #ff4b4b;
            box-shadow: 0 0 40px #ff4b4b66;
        }

        @keyframes pulsePTT {
            0% { box-shadow: 0 0 25px #46ff5f; }
            50% { box-shadow: 0 0 75px #46ff5f; }
            100% { box-shadow: 0 0 25px #46ff5f; }
        }

        .users-title {
            margin-top: 26px;
            font-size: 15px;
            color: #9fbba8;
        }

        #users {
            margin-top: 10px;
            background: #07110c;
            border: 1px solid #1f3f29;
            border-radius: 16px;
            padding: 14px;
            min-height: 50px;
            color: #ffffff;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-line;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            color: #52745d;
            font-size: 12px;
        }

        .hidden-audios {
            display: none;
        }
    </style>
</head>

<body>

<div class="app">

    <div class="top">
        <div class="logo">📡 TELSİZ</div>
        <div class="badge" id="onlineBadge">ONLINE</div>
    </div>

    <div class="card">
        <input id="username" placeholder="Kullanıcı adın">
        <input id="room" placeholder="Kanal adı">

        <button class="join" onclick="joinRoom()">Kanala Katıl</button>
    </div>

    <div class="status" id="status">Hazır</div>
    <div class="channel" id="channelText">Kanal yok</div>

    <div class="talking-box" id="talkingBox">
        Kimse konuşmuyor
    </div>

    <div class="ptt-wrap">
        <button id="ptt">PTT</button>
    </div>

    <div class="users-title">Bağlı kişiler</div>
    <div id="users">Henüz kimse yok</div>

    <div id="audios" class="hidden-audios"></div>

    <div class="footer">
        WebRTC telsiz sistemi
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
    const socket = io();

    let room = "";
    let username = "";
    let localStream;
    let audioTrack;

    const peers = {};
    const remoteAudios = {};

    const pttButton = document.getElementById("ptt");
    const statusText = document.getElementById("status");
    const channelText = document.getElementById("channelText");
    const usersDiv = document.getElementById("users");
    const audiosDiv = document.getElementById("audios");
    const talkingBox = document.getElementById("talkingBox");
    const onlineBadge = document.getElementById("onlineBadge");

    const config = {
        iceServers: [
            { urls: "stun:stun.l.google.com:19302" }
        ]
    };

    async function joinRoom() {
        username = document.getElementById("username").value.trim();
        room = document.getElementById("room").value.trim();

        if (!username) {
            alert("Kullanıcı adı gir");
            return;
        }

        if (!room) {
            alert("Kanal adı gir");
            return;
        }

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioTrack = localStream.getAudioTracks()[0];
            audioTrack.enabled = false;
        } catch (err) {
            alert("Bu cihazda mikrofon yok, sadece dinleme modu açıldı.");
            localStream = new MediaStream();
            audioTrack = null;
        }

        socket.emit("join-room", {
            room: room,
            username: username
        });

        statusText.innerText = "Kanala katıldın";
        channelText.innerText = "Kanal: " + room;
        talkingBox.innerText = "Kimse konuşmuyor";
    }

    function createPeer(targetId) {
        const pc = new RTCPeerConnection(config);
        peers[targetId] = pc;

        if (localStream && localStream.getTracks().length > 0) {
            localStream.getTracks().forEach(track => {
                pc.addTrack(track, localStream);
            });
        } else {
            pc.addTransceiver("audio", { direction: "recvonly" });
        }

        pc.ontrack = (event) => {
            if (!remoteAudios[targetId]) {
                const audio = document.createElement("audio");
                audio.autoplay = true;
                audio.playsInline = true;
                audio.volume = 1.0;
                audiosDiv.appendChild(audio);
                remoteAudios[targetId] = audio;
            }

            remoteAudios[targetId].srcObject = event.streams[0];

            remoteAudios[targetId].play().catch(() => {
                alert("Ses geldi ama tarayıcı çalmadı. Sayfaya bir kere dokun.");
            });
        };

        pc.onicecandidate = (event) => {
            if (event.candidate) {
                socket.emit("ice-candidate", {
                    target: targetId,
                    candidate: event.candidate
                });
            }
        };

        return pc;
    }

    socket.on("existing-users", async (users) => {
        for (const id in users) {
            if (id === socket.id) continue;

            const pc = createPeer(id);

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            socket.emit("offer", {
                target: id,
                offer: offer
            });
        }
    });

    socket.on("user-joined", (user) => {
        statusText.innerText = user.username + " kanala katıldı";
    });

    socket.on("offer", async (data) => {
        const pc = createPeer(data.from);

        await pc.setRemoteDescription(new RTCSessionDescription(data.offer));

        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);

        socket.emit("answer", {
            target: data.from,
            answer: answer
        });
    });

    socket.on("answer", async (data) => {
        const pc = peers[data.from];

        if (pc) {
            await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
        }
    });

    socket.on("ice-candidate", async (data) => {
        const pc = peers[data.from];

        if (pc && data.candidate) {
            try {
                await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
            } catch (err) {
                console.log("ICE hatası:", err);
            }
        }
    });

    socket.on("room-users", (users) => {
        const names = Object.values(users);

        if (names.length === 0) {
            usersDiv.innerText = "Henüz kimse yok";
        } else {
            usersDiv.innerText = names.map(name => "🟢 " + name).join("\\n");
        }
    });

    socket.on("user-left", (id) => {
        if (peers[id]) {
            peers[id].close();
            delete peers[id];
        }

        if (remoteAudios[id]) {
            remoteAudios[id].remove();
            delete remoteAudios[id];
        }
    });

    function startPTT() {
        if (!audioTrack) {
            alert("Bu cihazda mikrofon yok, sadece dinleyebilirsin.");
            return;
        }

        socket.emit("ptt-start");
    }

    function stopPTT() {
        if (!audioTrack) return;

        audioTrack.enabled = false;
        pttButton.classList.remove("active");
        pttButton.classList.remove("busy");

        statusText.innerText = "Dinlemede";

        talkingBox.classList.remove("active");
        talkingBox.classList.remove("busy");
        talkingBox.innerText = "Kimse konuşmuyor";

        onlineBadge.classList.remove("busy");
        onlineBadge.innerText = "ONLINE";

        socket.emit("ptt-stop");
    }

    socket.on("ptt-start", (data) => {
        talkingBox.classList.add("active");

        if (data.id === socket.id) {
            audioTrack.enabled = true;

            pttButton.classList.add("active");
            pttButton.classList.remove("busy");

            statusText.innerText = "Konuşuyorsun...";
            talkingBox.innerText = "🎙️ Sen konuşuyorsun";

            onlineBadge.classList.remove("busy");
            onlineBadge.innerText = "TX";
        } else {
            pttButton.classList.add("busy");

            statusText.innerText = "🎤 " + data.username + " konuşuyor...";
            talkingBox.innerText = "🎤 " + data.username + " konuşuyor...";

            onlineBadge.classList.add("busy");
            onlineBadge.innerText = "BUSY";
        }
    });

    socket.on("ptt-stop", () => {
        if (audioTrack) audioTrack.enabled = false;

        pttButton.classList.remove("active");
        pttButton.classList.remove("busy");

        statusText.innerText = "Dinlemede";

        talkingBox.classList.remove("active");
        talkingBox.classList.remove("busy");
        talkingBox.innerText = "Kimse konuşmuyor";

        onlineBadge.classList.remove("busy");
        onlineBadge.innerText = "ONLINE";
    });

    socket.on("channel-busy", (data) => {
        pttButton.classList.add("busy");

        statusText.innerText = "⛔ Kanal meşgul";
        talkingBox.classList.add("active");
        talkingBox.classList.add("busy");
        talkingBox.innerText = "⛔ " + data.username + " konuşuyor";

        onlineBadge.classList.add("busy");
        onlineBadge.innerText = "BUSY";
    });

    pttButton.addEventListener("mousedown", startPTT);
    pttButton.addEventListener("mouseup", stopPTT);
    pttButton.addEventListener("mouseleave", stopPTT);

    pttButton.addEventListener("touchstart", (e) => {
        e.preventDefault();
        startPTT();
    });

    pttButton.addEventListener("touchend", (e) => {
        e.preventDefault();
        stopPTT();
    });
</script>

</body>
</html>
